name: link checker

on:
  # Run workflow to be triggered manually
  workflow_dispatch:
    inputs:
      deployment_url:
        type: string
        description: 'Deployment URL'
        required: false
        default: 'https://docs.balena.io'
  # Check links once a week on Monday
  schedule:
    - cron: '00 00 * * 1'
  # Allow workflow to be called by other workflows
  workflow_call:
    inputs:
      deployment_url:
        type: string
        description: 'Deployment URL'
        required: false
        default: 'https://docs.balena.io'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write

env:
  lychee_exit_code: 0

jobs:
  Checking-Links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      # Run link checker on the generated HTML
      - name: Run Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@2b973e86fc7b1f6b36a93795fe2c9c6ae1118621 # v1.10.0
        with:
          args: >
            --base ${{ inputs.deployment_url || 'https://docs.balena.io' }}
            --config ./lychee.toml
            pages/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue From File
        if: env.lychee_exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Link Checker Report
          token: ${{ secrets.GITHUB_TOKEN }}
          content-filepath: ./lychee/out.md
          labels: |
            report
            automated issue

      - name: Save lychee cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: always()
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
