name: link checker

on:
  # Run workflow to be triggered manually
  workflow_dispatch:
  # Check links once a week on Monday
  schedule:
    - cron: '00 00 * * 1'
  # Allow workflow to be called by other workflows
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  Checking-Links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >
            --config ./lychee.toml
            --root-dir ${{ github.workspace }}
            pages/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          # continue on error for scheduled workflows in order to create an issue
          fail: ${{ github.event_name != 'schedule' }}

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Link Checker Report
          token: ${{ secrets.GITHUB_TOKEN }}
          content-filepath: ./lychee/out.md
          labels: |
            report
            automated issue

      - name: Save lychee cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: ! cancelled()
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
